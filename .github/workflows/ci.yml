name: OrchidApp CI

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:

  build:
    name: Build (linux-arm64)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore src/OrchidApp.Web -r linux-arm64

      - name: Build
        run: |
          echo "Building OrchidApp..."
          dotnet build src/OrchidApp.Web --configuration Release --no-restore -r linux-arm64

      - name: Publish linux-arm64
        run: |
          echo "Publishing linux-arm64..."
          dotnet publish src/OrchidApp.Web \
            -c Release \
            -r linux-arm64 \
            --self-contained false \
            --no-restore \
            -o publish

      - name: Verify publish output
        run: |
          if [ ! -f publish/OrchidApp.Web.dll ]; then
            echo "Publish output missing"
            exit 1
          fi


  schema-contract:
    name: Schema contract validation
    runs-on: ubuntu-latest

    services:
      mariadb:
        image: mariadb:10.11
        env:
          MARIADB_ROOT_PASSWORD: root
          MARIADB_DATABASE: orchids
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install MariaDB client
        run: sudo apt-get update && sudo apt-get install -y mariadb-client

      - name: Wait for MariaDB
        run: |
          for i in {1..10}; do
            mysql -h 127.0.0.1 -uroot -proot -e "SELECT 1" && break
            echo "Waiting for DB..."
            sleep 2
          done

      - name: Recreate database with utf8mb4
        run: |
          mysql -h 127.0.0.1 -uroot -proot -e "DROP DATABASE IF EXISTS orchids;"
          mysql -h 127.0.0.1 -uroot -proot -e "CREATE DATABASE orchids CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;"

      - name: Apply schema (tables)
        run: |
          for f in $(ls database/schema/tables/*.sql | sort); do
            echo "Applying $f"
            mysql -h 127.0.0.1 -uroot -proot orchids < "$f" || exit 1
          done

      - name: Apply constraints
        run: |
          for f in $(ls database/schema/constraints/*.sql | sort); do
            echo "Applying $f"
            mysql -h 127.0.0.1 -uroot -proot orchids < "$f" || exit 1
          done

      - name: Apply routines
        run: |
          for f in $(ls database/schema/routines/*.sql | sort); do
            echo "Applying $f"
            mysql -h 127.0.0.1 -uroot -proot orchids < "$f" || exit 1
          done

      - name: Apply views
        run: |
          for f in $(ls database/schema/views/*.sql | sort); do
            echo "Applying $f"
            mysql -h 127.0.0.1 -uroot -proot orchids < "$f" || exit 1
          done

      - name: Apply triggers
        run: |
          for f in $(ls database/schema/triggers/*.sql | sort); do
            echo "Applying $f"
            mysql -h 127.0.0.1 -uroot -proot orchids < "$f" || exit 1
          done

      - name: Run schema export
        env:
          MYSQL_HOST: 127.0.0.1
          MYSQL_PORT: 3306
          MYSQL_USER: root
          MYSQL_PASSWORD: root
        run: pwsh ./database/scripts/Export-MariaDBSchema.ps1

      - name: Detect drift
        run: |
          if [[ -n $(git status --porcelain) ]]; then
            echo "Schema drift detected!"
            git status
            git --no-pager diff
            exit 1
          fi

      - name: Schema validation passed
        run: echo "Schema is deterministic and valid"