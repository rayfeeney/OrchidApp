name: OrchidApp CI

on:
  workflow_dispatch:

jobs:

  build:
    name: Build (linux-arm64)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Publish linux-arm64
        run: |
          dotnet publish src/OrchidApp.Web \
            -c Release \
            -r linux-arm64 \
            --self-contained false \
            -o publish

  migration-sql-validation:
    name: Migration SQL validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate migration SQL files
        run: |
              echo "Validating migration SQL files..."

              if [ ! -d "database/migrations" ]; then
                echo "No migrations folder found — skipping"
                exit 0
              fi

              files=$(find database/migrations -name "*.sql" | sort)

              prev=""
              for f in $files; do
                name=$(basename "$f")

                # Validate naming
                if [[ ! $name =~ ^[0-9]{12}_.+\.sql$ ]]; then
                  echo "Invalid migration file name: $name"
                  exit 1
                fi

                ts=${name:0:12}

                # Ordering check
                if [[ -n "$prev" && "$ts" < "$prev" ]]; then
                  echo "Out-of-order migration: $name"
                  exit 1
                fi

                # Duplicate timestamp
                if [[ "$ts" == "$prev" ]]; then
                  echo "Duplicate timestamp detected: $name"
                  exit 1
                fi

                prev=$ts
              done

              echo "Migration SQL validation passed"

  schema-contract:
    name: Schema contract validation
    runs-on: ubuntu-latest

    services:
      mariadb:
        image: mariadb:11
        env:
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install MySQL client
        run: sudo apt-get update && sudo apt-get install -y mysql-client

      - name: Wait for MariaDB
        run: |
          for i in {1..30}; do
            mysql -h 127.0.0.1 -uroot -proot -e "SELECT 1" && break
            echo "Waiting for DB..."
            sleep 2
          done

      - name: Create database
        run: |
          mysql -h 127.0.0.1 -uroot -proot -e "CREATE DATABASE orchids;"

      - name: Apply schema (tables first)
        run: |
          for f in database/schema/tables/*.sql; do
            mysql -h 127.0.0.1 -uroot -proot orchids < "$f"
          done

      - name: Apply constraints
        run: |
          for f in database/schema/constraints/*.sql; do
            mysql -h 127.0.0.1 -uroot -proot orchids < "$f"
          done

      - name: Apply views
        run: |
          for f in database/schema/views/*.sql; do
            mysql -h 127.0.0.1 -uroot -proot orchids < "$f"
          done

      - name: Apply routines
        run: |
          for f in database/schema/routines/*.sql; do
            mysql -h 127.0.0.1 -uroot -proot orchids < "$f"
          done

      - name: Apply triggers
        run: |
          for f in database/schema/triggers/*.sql; do
            mysql -h 127.0.0.1 -uroot -proot orchids < "$f"
          done

      - name: Run schema export
        env:
          MYSQL_HOST: 127.0.0.1
          MYSQL_PORT: 3306
          MYSQL_USER: root
          MYSQL_PASSWORD: root
        run: pwsh ./database/scripts/Export-MySqlSchema.ps1

      - name: Detect drift
        run: |
          if [[ -n $(git status --porcelain) ]]; then
            echo "Schema drift detected!"
            git status
            git diff
            exit 1
          fi

      - name: Schema validation passed
        run: echo "Schema is deterministic and valid"